ndo — em tempo real, consultável, entre secretarias.","links":[{"t":"post de lançamento","h":"https://www.dados.rio/post/o-primeiro-datalake-publico-municipal-do-mundo","cap":"dados.rio"}]},{"date":"2022-05","type":"dataviz","title":"quanto custa um frangão no seu bairro?","desc":"nosso maior sucesso daquele ano — um índice à la Big Mac do frango em 160 bairros; dezenas de milhares de impressões e eco na imprensa.","links":[{"t":"frangão","h":"https://www.dados.rio/post/quanto-custa-um-frangao-no-seu-bairro","cap":"visualização"}]},{"date":"2022-05","type":"dataviz","title":"os dias mais frios do Rio","desc":"ranqueamos os dias mais frios da série histórica — uma peça de clima antes das matérias de calor.","links":[{"t":"post","h":"https://www.dados.rio/post/os-dias-mais-frios-da-cidade-do-rio-de-janeiro","cap":"visualização"}]},{"date":"2022-04","type":"dataviz","title":"visualizações dados.rio — início de 2022","desc":"peças iniciais do escritório: escola de samba é carnaval da elite?, ranking das chuvas e desigualdade da imigração no Rio.","links":[{"t":"escolas de samba","h":"https://www.dados.rio/post/escola-de-samba-e-carnaval-da-elite","cap":"abr/2022"},{"t":"chuvas","h":"https://www.dados.rio/post/ranking-das-chuvas-no-rio-de-janeiro","cap":"abr/2022"},{"t":"imigração","h":"https://www.dados.rio/post/desigualdade-da-imigracao-no-rio-de-janeiro","cap":"abr/2022"}]},{"date":"2022","type":"dataviz","title":"BRT em fatos & Do batente ao batuque","desc":"dois especiais iniciais: corredores do BRT passado e futuro em números, e o retorno do Carnaval para todo carioca — até quem foge do samba.","links":[{"t":"BRT passado e futuro","h":"https://www.dados.rio/especiais/brt","cap":"especial"},{"t":"Do batente ao batuque","h":"https://www.dados.rio/especiais/do-batente-ao-batuque","cap":"especial"}]}];

        section.style.setProperty("--bg", color);
        dMeta.textContent = m.date || "";
        dTitle.textContent = cap(m.title);
        dDesc.textContent = cap(m.desc || "");
        dLinks.innerHTML = (m.links || []).map(function (l) {
          return '<a class="ttcl__lnk" href="' + l.h + '" target="_blank" rel="noopener">' +
            '<span class="ttcl__lnk-t">' + l.t + '</span>' +
            (l.cap ? '<span class="ttcl__lnk-c">' + l.cap + '</span>' : '') +
            '</a>';
        }).join("");
        detail.classList.add("is-on");
        syncMobile();
      }

      // on mobile the card is fixed at the top with auto height (no internal scroll);
      // push the list down so it starts right below the card
      function syncMobile() {
        if (window.matchMedia("(max-width: 860px)").matches) {
          listEl.style.marginTop = detail.offsetHeight + "px";
        } else {
          listEl.style.marginTop = "";
        }
      }
      window.addEventListener("resize", syncMobile);
      window.addEventListener("load", syncMobile);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(syncMobile);

      rows.forEach((li) => li.addEventListener("mouseenter", () => activate(li)));

      let ticking = false;
      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const cy = window.innerHeight / 2;
          let best = null, bestD = Infinity;
          for (const li of rows) {
            const r = li.getBoundingClientRect();
            if (r.bottom < 0 || r.top > window.innerHeight) continue;
            const d = Math.abs(r.top + r.height / 2 - cy);
            if (d < bestD) { bestD = d; best = li; }
          }
          if (best) activate(best);
          ticking = false;
        });
      }
      window.addEventListener("scroll", onScroll, { passive: true });

      // drag the detail card (desktop)
      let dragging = false, sx = 0, sy = 0, tx = 0, ty = 0, bx = 0, by = 0;
      detail.addEventListener("pointerdown", (e) => {
        if (window.matchMedia("(max-width: 860px)").matches) return; // card is pinned on mobile
        if (e.target.closest("a")) return; // let buttons work
        dragging = true; sx = e.clientX; sy = e.clientY; bx = tx; by = ty;
        detail.classList.add("is-drag");
        detail.setPointerCapture(e.pointerId);
      });
      detail.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        tx = bx + (e.clientX - sx); ty = by + (e.clientY - sy);
        detail.style.transform = "translate(" + tx + "px, calc(-50% + " + ty + "px))";
      });
      const endDrag = () => { dragging = false; detail.classList.remove("is-drag"); };
      detail.addEventListener("pointerup", endDrag);
      detail.addEventListener("pointercancel", endDrag);

      activate(rows[0]);
      onScroll();
    })();
  </script>
