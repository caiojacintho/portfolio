    // até 10 cores, atribuídas por posição — cicla de modo que
    // duas linhas vizinhas nunca compartilhem a mesma cor
    const PALETTE = ["#22c55e","#f59e0b","#38bdf8","#a3e635","#f472b6","#c4b5fd","#fbbf24","#67e8f9","#fca5a5","#fdba74"];

    (function () {
      const section = document.getElementById("ttcl");
      const listEl = document.getElementById("ttclList");
      const detail = document.getElementById("ttclDetail");
      const dMeta = document.getElementById("dMeta");
      const dCat = document.getElementById("dCat");
      const dTitle = document.getElementById("dTitle");
      const dDesc = document.getElementById("dDesc");
      const dLinks = document.getElementById("dLinks");
      const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>';

      const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);

      const rows = [];
      MENTIONS.forEach((m, i) => {
        const li = document.createElement("li");
        li.className = "ttcl__row";
        li.dataset.idx = i;
        li.dataset.type = m.type;
        li.innerHTML =
          '<span class="ttcl__name">' + cap(m.title) + '</span>' +
          '<span class="ttcl__badge">' + cap(m.type) + '</span>';
        listEl.appendChild(li);
        rows.push(li);
      });

      // subtle click sound when the selected line changes (synthesized, no asset)
      var actx = null;
      function ensureAudio() {
        try {
          if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
          if (actx.state === "suspended") actx.resume();
        } catch (e) {}
      }
      function clickSound() {
        if (!actx || actx.state !== "running") return;
        var t = actx.currentTime;
        var o = actx.createOscillator(), g = actx.createGain();
        o.type = "square";
        o.frequency.setValueAtTime(1100, t);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.11, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
        o.connect(g); g.connect(actx.destination);
        o.start(t); o.stop(t + 0.05);
      }
      ["pointerdown", "keydown", "wheel", "touchstart", "scroll"].forEach(function (ev) {
        window.addEventListener(ev, ensureAudio, { passive: true });
      });

      let activeRow = null;
      function activate(li) {
        if (li === activeRow) return;
        if (activeRow) activeRow.classList.remove("is-active");
        activeRow = li;
        li.classList.add("is-active");
        const idx = +li.dataset.idx;
        const m = MENTIONS[idx];
        const color = PALETTE[idx % PALETTE.length];
        section.style.setProperty("--bg", color);
        dMeta.textContent = (m.date || "").slice(0, 4);
        dCat.textContent = cap(m.type || "");
        dTitle.textContent = cap(m.title);
        dDesc.textContent = cap(m.desc || "");
        dLinks.innerHTML = (m.links || []).map(function (l) {
          return '<a class="ttcl__lnk" href="' + l.h + '" target="_blank" rel="noopener">' +
            '<span class="ttcl__lnk-t">' + l.t + '</span>' +
            (l.cap ? '<span class="ttcl__lnk-c">' + l.cap + '</span>' : '') +
            '</a>';
        }).join("");
        detail.classList.add("is-on");
        clickSound();
        syncMobile();
      }

      // on mobile the card is fixed at the top with auto height (no internal scroll);
      // push the list down so it starts right below the card
      function syncMobile() { listEl.style.marginTop = ""; listEl.style.paddingBottom = ""; }
      window.addEventListener("resize", syncMobile);
      window.addEventListener("load", syncMobile);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(syncMobile);

      // activation is scroll-driven only; tap still lets you jump to an item
      rows.forEach((li) => li.addEventListener("click", () => activate(li)));

      function onScroll() {
        // scroll-driven: active = the item you've scrolled down to (last one past the ref line)
        const refY = window.innerHeight * 0.22;
        let best = null;
        for (const li of rows) {
          if (li.classList.contains("is-hidden")) continue;
          if (li.getBoundingClientRect().top <= refY) best = li;
          else break;
        }
        if (!best) best = rows.find(li => !li.classList.contains("is-hidden"));
        if (best) activate(best);
      }
      window.addEventListener("scroll", onScroll, { passive: true });

      // drag the detail card (desktop)
      let dragging = false, sx = 0, sy = 0, tx = 0, ty = 0, bx = 0, by = 0;
      detail.addEventListener("pointerdown", (e) => {
        if (window.matchMedia("(max-width: 860px)").matches) return; // card is pinned on mobile
        if (e.target.closest("a")) return; // let buttons work
        dragging = true; sx = e.clientX; sy = e.clientY; bx = tx; by = ty;
        detail.classList.add("is-drag");
        detail.setPointerCapture(e.pointerId);
      });
      detail.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        tx = bx + (e.clientX - sx); ty = by + (e.clientY - sy);
        detail.style.transform = "translate(" + tx + "px, calc(-50% + " + ty + "px))";
      });
      const endDrag = () => { dragging = false; detail.classList.remove("is-drag"); };
      detail.addEventListener("pointerup", endDrag);
      detail.addEventListener("pointercancel", endDrag);

      // ---- category filter (Mentions header) ----
      const filterEl = document.getElementById("mFilter");
      const cats = [];
      MENTIONS.forEach(m => { if (!cats.includes(m.type)) cats.push(m.type); });
      let activeCats = null; // null = all categories shown
      function addChip(label, cat) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "mfilter-chip";
        b.textContent = label;
        b.dataset.cat = cat;
        filterEl.appendChild(b);
      }
      addChip("All", "__all");
      cats.forEach(c => addChip(cap(c), c));
      function renderChips() {
        [...filterEl.children].forEach(b => {
          const c = b.dataset.cat;
          const on = c === "__all" ? (activeCats === null) : (activeCats && activeCats.has(c));
          b.classList.toggle("is-on", !!on);
        });
      }
      function applyFilter() {
        for (const li of rows) {
          const vis = activeCats === null || activeCats.has(li.dataset.type);
          li.classList.toggle("is-hidden", !vis);
        }
        renderChips();
        const firstVis = rows.find(li => !li.classList.contains("is-hidden"));
        if (firstVis) { activeRow = null; activate(firstVis); }
        listEl.scrollTop = 0;
        window.scrollTo(0, 0);
      }
      filterEl.addEventListener("click", (e) => {
        const b = e.target.closest(".mfilter-chip");
        if (!b) return;
        const c = b.dataset.cat;
        if (c === "__all") activeCats = null;
        else if (activeCats === null) activeCats = new Set([c]);
        else {
          activeCats.has(c) ? activeCats.delete(c) : activeCats.add(c);
          if (activeCats.size === 0) activeCats = null;
        }
        applyFilter();
      });
      renderChips();

      // on mobile the filter scrolls with the content (moved into the list flow);
      // on desktop it lives in the header between the logo and the nav
      const headerHost = filterEl.parentElement;         // .navigation-items-2
      const headerAnchor = filterEl.nextElementSibling;  // the nav .navigation-wrap
      function placeFilter() {
        const mobile = window.matchMedia("(max-width: 860px)").matches;
        if (mobile && filterEl.parentElement !== section) {
          section.insertBefore(filterEl, listEl);
        } else if (!mobile && filterEl.parentElement !== headerHost) {
          headerHost.insertBefore(filterEl, headerAnchor);
        }
      }
      window.addEventListener("resize", placeFilter);
      placeFilter();

      // start with the first item selected; scroll takes over from there
      activate(rows[0]);
    })();
  </script>
