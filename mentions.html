  <style>
    /* ===== Tik Tik Color List (vanilla recreation) ===== */
    .ttcl {
      --bg: #22c55e;
      min-height: 100vh;
      width: 100%;
      background-color: var(--bg);
      transition: background-color .6s cubic-bezier(.22,.61,.36,1);
      padding: 22vh 5vw 14vh;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }
    .ttcl__list { list-style: none; margin: 0; padding: 0; max-width: 1400px; }
    .ttcl__row {
      display: flex;
      align-items: baseline;
      gap: 22px;
      padding: 6px 0;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ttcl__name {
      font-family: "Montserrat", sans-serif;
      font-weight: 600;
      font-size: clamp(2rem, 6.6vw, 4.6rem);
      line-height: 1.02;
      letter-spacing: -0.035em;
      color: rgba(0,0,0,.22);
      transition: color .35s ease, transform .35s ease;
      white-space: nowrap;
    }
    .ttcl__badge {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(0,0,0,.55);
      background: rgba(0,0,0,.07);
      border-radius: 999px;
      padding: 6px 15px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .35s ease, transform .35s ease, color .35s ease, background .35s ease;
    }
    .ttcl__date {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(0,0,0,.35);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .35s ease;
    }
    .ttcl__row.is-active .ttcl__name { color: #000; }
    .ttcl__row.is-active .ttcl__badge { opacity: 1; transform: translateX(0); color: #000; background: rgba(0,0,0,.1); }
    .ttcl__row.is-active .ttcl__date { opacity: 1; }

    /* floating draggable preview */
    .ttcl__preview {
      position: fixed;
      top: 50%;
      right: 7vw;
      width: min(340px, 32vw);
      aspect-ratio: 3 / 4;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.28);
      transform: translate(0, -50%) scale(.96);
      opacity: 0;
      transition: opacity .4s ease, transform .4s ease;
      pointer-events: none;
      z-index: 40;
      touch-action: none;
      background: rgba(0,0,0,.08);
    }
    .ttcl__preview.is-on { opacity: 1; pointer-events: auto; cursor: grab; }
    .ttcl__preview.is-drag { cursor: grabbing; transition: opacity .4s ease; }
    .ttcl__preview img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

    .ttcl__hint {
      position: fixed; left: 5vw; bottom: 26px;
      font-family: "DM Sans", sans-serif; font-size: 12px; letter-spacing: .02em;
      color: rgba(0,0,0,.45); z-index: 30; pointer-events: none;
    }
    .ttcl__credit {
      position: fixed; right: 5vw; bottom: 26px;
      font-family: "DM Sans", sans-serif; font-size: 11px; letter-spacing: .02em;
      color: rgba(0,0,0,.4); z-index: 30;
    }
    .ttcl__credit a { color: inherit; text-decoration: underline; }
    @media (max-width: 767px) {
      .ttcl__preview { display: none; }
      .ttcl__row { gap: 12px; flex-wrap: wrap; }
      .ttcl__name { white-space: normal; }
    }
    /* nav mentions item with icon */
    .mentions-link { display: inline-flex; align-items: center; gap: 6px; }
    .mentions-link svg { width: 13px; height: 13px; flex: 0 0 auto; }

  <script>
    // ==== EDIT YOUR MENTIONS HERE ====
    // Each entry: { name, badge, date, bgColor, image }
    const IMG = "https://cdn.prod.website-files.com/68a2615b8b73ca5020d09452/";
    const MENTIONS = [
      { name: "Concursos de Projeto", badge: "Architecture Award", date: "[2018]", bgColor: "#22c55e", image: IMG + "68b119088835337432ebc746_architecture-7.jpg" },
      { name: "Dados.Rio",            badge: "Data Storytelling",  date: "[2024]", bgColor: "#f59e0b", image: IMG + "68b117f96687e6c50b224847_graphics-1.jpg" },
      { name: "IplanRio",             badge: "Design Leadership",  date: "[2025]", bgColor: "#ffffff", image: IMG + "68b11827d788d8437ae266a9_graphics-2.jpg" },
      { name: "Prefeitura do Rio",    badge: "Civic Design",       date: "[2023]", bgColor: "#a3e635", image: IMG + "68b1192c993c47b9b00bfb8a_architecture-4.jpg" },
      { name: "Invest Rio",           badge: "Product Design",     date: "[2024]", bgColor: "#38bdf8", image: IMG + "68b1184076a7abef01a92bfc_graphics-7.jpg" },
      { name: "G20 Social",           badge: "Data Visualization", date: "[2024]", bgColor: "#f472b6", image: IMG + "68b1184a1645c70f65019182_graphics-6.jpg" },
      { name: "Revolusolar",          badge: "Brand & Web",        date: "[2023]", bgColor: "#fbbf24", image: IMG + "68b119252fb8ae13b1562dfe_architecture-1.jpg" },
      { name: "Embyá",                badge: "Visual Identity",    date: "[2022]", bgColor: "#c4b5fd", image: IMG + "68b1198a974067ae1d5ff56e_architecture-2.jpg" },
    ];

    (function () {
      const section = document.getElementById("ttcl");
      const listEl = document.getElementById("ttclList");
      const preview = document.getElementById("ttclPreview");
      const previewImg = document.getElementById("ttclPreviewImg");

      // Render list 3x for an "infinite-ish" length
      const REPEAT = 3;
      const rows = [];
      for (let r = 0; r < REPEAT; r++) {
        MENTIONS.forEach((m, i) => {
          const li = document.createElement("li");
          li.className = "ttcl__row";
          li.dataset.idx = i;
          li.innerHTML =
            '<span class="ttcl__name">' + m.name + '</span>' +
            '<span class="ttcl__badge">' + m.badge + '</span>' +
            '<span class="ttcl__date">' + m.date + '</span>';
          listEl.appendChild(li);
          rows.push(li);
        });
      }

      let activeRow = null;
      function activate(li) {
        if (li === activeRow) return;
        if (activeRow) activeRow.classList.remove("is-active");
        activeRow = li;
        li.classList.add("is-active");
        const m = MENTIONS[+li.dataset.idx];
        section.style.setProperty("--bg", m.bgColor);
        if (previewImg.getAttribute("src") !== m.image) previewImg.src = m.image;
        preview.classList.add("is-on");
      }

      rows.forEach((li) => {
        li.addEventListener("mouseenter", () => activate(li));
      });

      // Scroll: activate the row nearest the viewport vertical center (drives mobile + wheel)
      let ticking = false;
      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const cy = window.innerHeight / 2;
          let best = null, bestD = Infinity;
          for (const li of rows) {
            const rect = li.getBoundingClientRect();
            if (rect.bottom < 0 || rect.top > window.innerHeight) continue;
            const d = Math.abs(rect.top + rect.height / 2 - cy);
            if (d < bestD) { bestD = d; best = li; }
          }
          if (best) activate(best);
          ticking = false;
        });
      }
      window.addEventListener("scroll", onScroll, { passive: true });

      // Draggable preview
      let dragging = false, sx = 0, sy = 0, tx = 0, ty = 0, bx = 0, by = 0;
      preview.addEventListener("pointerdown", (e) => {
        dragging = true; sx = e.clientX; sy = e.clientY; bx = tx; by = ty;
        preview.classList.add("is-drag");
        preview.setPointerCapture(e.pointerId);
      });
      preview.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        tx = bx + (e.clientX - sx);
        ty = by + (e.clientY - sy);
        preview.style.transform = "translate(" + tx + "px, calc(-50% + " + ty + "px))";
      });
      const endDrag = (e) => { dragging = false; preview.classList.remove("is-drag"); };
      preview.addEventListener("pointerup", endDrag);
      preview.addEventListener("pointercancel", endDrag);

      // Initial state
      activate(rows[0]);
      onScroll();
    })();
  </script>
