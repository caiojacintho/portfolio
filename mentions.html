    const MENTIONS = [{"id":"m01","date":"2026","type":"website","title":"Pref.Rio — City of Rio official portal","desc":"The City of Rio de Janeiro's official portal, bringing public services, information and citizen support together in one place. I worked on the design and digital communication.","links":[{"t":"pref.rio","h":"http://pref.rio/","cap":"acesso"}],"title_pt":"Pref.Rio — portal oficial da Prefeitura do Rio","desc_pt":"O portal oficial da cidade do Rio de Janeiro, reunindo serviços públicos, informações e atendimento ao cidadão em um só lugar. Atuei no design e na comunicação digital."},{"id":"m02","date":"2026","type":"website","title":"Carioca Opportunities","desc":"A City of Rio platform gathering free, certified courses, connecting cariocas to training and job opportunities.","links":[{"t":"Oportunidades Cariocas","h":"https://pref.rio/servicos/cursos","cap":"acesso"},{"t":"nota da prefeitura","h":"https://prefeitura.rio/cidade/prefeitura-lanca-plataforma-para-gerar-oportunidades-de-trabalho-e-capacitacao-de-profissionais/","cap":"news"}],"title_pt":"Oportunidades Cariocas","desc_pt":"Uma plataforma da Prefeitura do Rio que reúne cursos gratuitos e certificados, conectando cariocas a capacitação e oportunidades de trabalho."},{"id":"m05a","date":"2026","type":"website","title":"Between Acts Institute","desc":"The first Brazilian institute dedicated to making a career break a recognized part of a professional path.","links":[{"t":"institutoentreatos.com.br","h":"https://institutoentreatos.com.br/","cap":"acesso"}],"title_pt":"Instituto Entre Atos","desc_pt":"O primeiro instituto brasileiro dedicado a tornar a pausa de carreira uma parte reconhecida da trajetória profissional."},{"id":"m05b","date":"2026","type":"website","title":"Revolusolar","desc":"A nonprofit founded in 2015 in Rio’s Morro da Babilônia favela, fighting energy poverty through solar power. It builds solar communities that pair clean energy with job creation and education — from the first solar cooperative in a Brazilian favela to a model now replicated nationwide.","links":[{"t":"revolusolar.org.br","h":"https://www.revolusolar.org.br/","cap":"acesso"}],"title_pt":"Revolusolar","desc_pt":"Uma organização sem fins lucrativos fundada em 2015 no Morro da Babilônia, no Rio, que combate a pobreza energética por meio da energia solar. Cria comunidades solares que unem energia limpa, geração de emprego e educação — da primeira cooperativa solar em uma favela brasileira a um modelo hoje replicado por todo o país."},{"id":"m07","date":"2026","type":"dataviz","title":"Does verticalization drive densification?","desc":"A data visualization exploring whether verticalization really densifies the population, and how São Paulo's Master Plan can foster a more compact city. In partnership with Insper / Portal Cidades.","links":[{"t":"Adensamento","h":"https://portalcidados.github.io/datavis/#/adensamento","cap":"acesso"}],"title_pt":"A verticalização gera adensamento?","desc_pt":"Uma visualização de dados que investiga se a verticalização realmente adensa a população e como o Plano Diretor de São Paulo pode favorecer uma cidade mais compacta. Em parceria com Insper / Portal Cidades."},{"id":"m08","date":"2026","type":"dataviz","title":"Heat islands and air quality in Maré","desc":"A data story on heat islands and air quality in Maré: the Respira Maré project mapped, over seven months, temperatures up to 2°C higher and pollutants affecting the health of one of Rio's largest favelas.","links":[{"t":"Portal Cidades","h":"https://portal-cidados.vercel.app/historias/ilhas-de-calor","cap":"acesso"}],"title_pt":"Ilhas de calor e qualidade do ar na Maré","desc_pt":"Uma reportagem em dados sobre ilhas de calor e qualidade do ar na Maré: o projeto Respira Maré mapeou, ao longo de sete meses, temperaturas até 2°C mais altas e poluentes que afetam a saúde de uma das maiores favelas do Rio."},{"id":"m09","date":"2026","type":"dataviz","title":"A portrait of health inequalities","desc":"A portrait of health inequalities in the city of São Paulo: mortality risks and socioeconomic determinants, cross-referencing diseases like diabetes with each territory's social conditions.","links":[{"t":"Portal Cidades","h":"https://portal-cidados.vercel.app/historias/desigualdades-em-saude-sp","cap":"acesso"}],"title_pt":"Um retrato das desigualdades em saúde","desc_pt":"Um retrato das desigualdades em saúde na cidade de São Paulo: riscos de mortalidade e determinantes socioeconômicos, cruzando doenças como o diabetes com as condições sociais de cada território."},{"id":"m10","date":"2026","type":"website","title":"Center for City Studies portal","desc":"The portal of the Center for City Studies (Insper's Arq.Futuro Lab) that turns urban research into data-driven narratives, bringing science closer to public debate on urban policy.","links":[{"t":"portal-cidados","h":"https://portal-cidados.vercel.app/","cap":"acesso"}],"title_pt":"Portal do Centro de Estudos das Cidades","desc_pt":"O portal do Centro de Estudos das Cidades (Laboratório Arq.Futuro do Insper) que transforma pesquisa urbana em narrativas baseadas em dados, aproximando a ciência do debate público sobre políticas urbanas."},{"id":"m11","date":"2026","type":"website","title":"National Observatory of Sustainable Mobility","desc":"An Insper (Center for City Studies) platform with Motiva that gathers urban-mobility indicators and evidence to connect cities and support more sustainable policies.","links":[{"t":"Observatório Insper","h":"https://observatorio.insper.edu.br/","cap":"acesso"}],"title_pt":"Observatório Nacional de Mobilidade Sustentável","desc_pt":"Uma plataforma do Insper (Centro de Estudos das Cidades) com a Motiva que reúne indicadores e evidências de mobilidade urbana para conectar cidades e apoiar políticas mais sustentáveis."},{"id":"m03","date":"2025","type":"website","title":"IplanRio — the City of Rio’s tech company","desc":"Rio de Janeiro's municipal information-technology company, responsible for the city's digital systems and services. I lead the Design team.","links":[{"t":"iplan.rio","h":"https://www.iplan.rio/","cap":"acesso"}],"title_pt":"IplanRio — a empresa de tecnologia do Rio","desc_pt":"A empresa municipal de tecnologia da informação do Rio de Janeiro, responsável pelos sistemas e serviços digitais da cidade. Lidero o time de Design."},{"id":"m04","date":"2025","type":"website","title":"Embyá — Brazilian landscape studio","desc":"A landscape and environmental-design studio — projects and works for collective spaces, vertical gardens and territorial planning. I handled the visual identity and digital presence.","links":[{"t":"embya.com.br","h":"https://www.embya.com.br/","cap":"acesso"}],"title_pt":"Embyá — estúdio brasileiro de paisagismo","desc_pt":"Um estúdio de paisagismo e design ambiental — projetos e obras para espaços coletivos, jardins verticais e planejamento territorial. Cuidei da identidade visual e da presença digital."},{"id":"m05","date":"2025","type":"website","title":"Invest Rio — where to invest in Rio","desc":"A portal that presents Rio to investors: business opportunities, data and incentives to attract investment and economic development to the city.","links":[{"t":"Invest Rio","h":"https://portal-de-investimentos.webflow.io/","cap":"acesso"}],"title_pt":"Invest Rio — onde investir no Rio","desc_pt":"Um portal que apresenta o Rio a investidores: oportunidades de negócio, dados e incentivos para atrair investimento e desenvolvimento econômico à cidade."},{"id":"m06","date":"2025","type":"dataviz","title":"Super Centro Carioca de Saúde","desc":"A data story about the Super Centro Carioca de Saúde — described as the largest health complex in Latin America — and how it helped shorten the Sisreg waiting line. Produced by the Data Office.","links":[{"t":"Supercentro","h":"https://viz.dados.rio/#/supercentro","cap":"acesso"}],"title_pt":"Super Centro Carioca de Saúde","desc_pt":"Uma reportagem em dados sobre o Super Centro Carioca de Saúde — descrito como o maior complexo de saúde da América Latina — e como ele ajudou a reduzir a fila do Sisreg. Produzido pelo Escritório de Dados."},{"id":"v01","date":"2025","type":"video","title":"Super Centro Carioca de Saúde — video","desc":"A video companion to the Super Centro Carioca de Saúde story on shortening the Sisreg waiting line, produced at IplanRio.","title_pt":"Super Centro Carioca de Saúde — vídeo","desc_pt":"Um vídeo que acompanha a reportagem do Super Centro Carioca de Saúde sobre a redução da fila do Sisreg, produzido na IplanRio.","links":[{"t":"video","h":"https://drive.google.com/file/d/1-z0Q1aRstb5xH9h1uEyGzg3wmpBr5fnI/view","cap":"acesso"}]},{"id":"m12","date":"2025-10","type":"website","title":"Integrated Clinical Record","desc":"A unified clinical record bringing together, for around 7 million patients, data across primary and emergency care. Built by the city health department (SMS) on the health data lake, with IplanRio / the Data Office.","links":[{"t":"HCI (SMS)","h":"https://saude.prefeitura.rio/hci/","cap":"acesso"},{"t":"nota SMS","h":"https://saude.prefeitura.rio/noticias/historico-clinico-integrado-saude-mais-eficiente-e-personalizada/","cap":"news"},{"t":"O Globo","h":"https://oglobo.globo.com/rio/noticia/2025/10/09/secretaria-municipal-de-saude-do-rio-desenvolve-plataforma-que-reune-historico-clinico-de-7-milhoes-de-pacientes.ghtml","cap":"news"}],"title_pt":"Prontuário Clínico Integrado","desc_pt":"Um prontuário clínico unificado que reúne, para cerca de 7 milhões de pacientes, dados da atenção primária e da emergência. Construído pela Secretaria Municipal de Saúde (SMS) sobre o data lake da saúde, com IplanRio / Escritório de Dados."},{"id":"m13","date":"2025-02","type":"website","title":"Mulher.Rio","desc":"An app from Rio's Women's Secretariat that helps women recognize signs of violence and find specialized support, anonymously. Technology with CIVITAS and IplanRio; later promoted on Taxi.Rio :"acesso"}]},{"id":"v05","date":"2024","type":"video","title":"BRT — animation","desc":"A motion-graphics video about Rio's BRT system, produced at IplanRio.","title_pt":"BRT — animação","desc_pt":"Um vídeo em motion graphics sobre o sistema BRT do Rio, produzido na IplanRio.","links":[{"t":"video","h":"https://drive.google.com/file/d/1GtziMF4oGuOsLsujKlCFK_hpw3fC2M9a/view","cap":"acesso"}]},{"id":"v06","date":"2024","type":"video","title":"Stations — animation","desc":"A motion-graphics video about the city's transport stations, produced at IplanRio.","title_pt":"Estações — animação","desc_pt":"Um vídeo em motion graphics sobre as estações de transporte da cidade, produzido na IplanRio.","links":[{"t":"video","h":"https://drive.google.com/file/d/1kEyHDm4KKSAWftrJrI6l1l_JlYu_1JAg/view","cap":"acesso"}]},{"id":"v07","date":"2024","type":"video","title":"Piedade — short","desc":"A short video about Piedade, produced at IplanRio.","title_pt":"Piedade — curta","desc_pt":"Um curta sobre Piedade, produzido na IplanRio.","links":[{"t":"video","h":"https://drive.google.com/file/d/1aMuDjBDZitU7EJ4mevgfbWlOzxpvv8-A/view","cap":"acesso"}]},{"id":"m14","date":"2024-11","type":"dataviz","title":"G20 in Data","desc":"We published an interactive special about what hosting the G20 meant for Rio — money, people and the city's global stage.","links":[{"t":"G20 em Dados","h":"https://prefeitura-rio.github.io/viz_G20/","cap":"acesso"}],"title_pt":"G20 em Dados","desc_pt":"Publicamos um especial interativo sobre o que sediar o G20 significou para o Rio — dinheiro, pessoas e a projeção global da cidade."},{"id":"m15","date":"2024-06","type":"dataviz","title":"We're watching!","desc":"A public narrative about how the city’s intelligence center watches the city 24/7 — cameras, radars and the pipes behind public safety.","links":[{"t":"Estamos de olho!","h":"https://viz-staging.dados.rio/#/civitas","cap":"acesso"},{"t":"especiais","h":"https://www.dados.rio/especiais","cap":"acesso"}],"titl .github.io/LegadoOlimpico/","cap":"acesso"}],"title_pt":"Sem elefantes brancos","desc_pt":"Um especial em dados sobre a \"arquitetura nômade\" do Rio 2016 — como a cidade evitou elefantes brancos ao projetar estruturas reutilizáveis, depois desmontadas e transformadas em legado duradouro para os moradores. Produzido pelo Escritório de Dados."},{"id":"m18","date":"2024-03","type":"dataviz","title":"What would Rio be without the Olympics?","desc":"A data special asking what Rio would be without the 2016 Games — mapping the legacy they made possible: the BRT corridors, the VLT tram, the Operations Center (COR), Porto Maravilha and the Museu do Amanhã. Produced by the Data Office.","links":[{"t":"sem as Olimpíadas","h":"https://prefeitura-rio.github.io/LegadoOlimpico2/","cap":"acesso"}],"title_pt":"O que seria do Rio sem as Olimpíadas?","desc_pt":"Um especial em dados que pergunta o que seria do Rio sem os Jogos de 2016 — mapeando o legado que eles tornaram possível: os corredores de BRT, o VLT, o Centro de Operações (COR), o Porto Maravilha e o Museu do Amanhã. Produzido pelo Escritório de Dados."},{"id":"m19","date":"2024","type":"dataviz","title":"Destination: Rio de Janeiro — megaevents","desc":"We mapped why the city spends public money to host the world — not just for the picture.","links":[{"t":"Destino: Rio","h":"https://viz.dados.rio/#/megaeventos","cap":"acesso"}],"title_pt":"Destino: Rio de Janeiro — megaeventos","desc_pt":"Mapeamos por que a cidade investe dinheiro público para sediar o mundo — e não só pela foto."},{"id":"m20","date":"2024","type":"dataviz","title":"Works & CEP — where the city invests","desc":"Two specials: infrastructure prioritized for the North and West Zones, and the CEP — the street program against violence.","links":[{"t":"A gente prioriza…","h":"https://viz.dados.rio/#/obras","cap":"acesso"},{"t":"Seu Rio, Sua Rua","h":"https://viz.dados.rio/#/especial-seop/cep","cap":"acesso"}],"title_pt":"Obras & CEP — onde a cidade investe","desc_pt":"Dois especiais: a infraestrutura priorizada para as Zonas Norte e Oeste e o CEP — o programa de rua contra a violência."},{"id":"m21","date":"2023-12","type":"dataviz","title":"Rio, Capital of the World","desc":"A time-travel data story about the city's long bet on hosting the world — during the G20 season.","links":[{"t":"Rio Capital do Mundo","h":"https://prefeitura-rio.github.io/G20Dataviz/","cap":"acesso"}],"title_pt":"Rio, Capital do Mundo","desc_pt":"Uma reportagem em dados que viaja no tempo pela antiga aposta da cidade em sediar o mundo — durante a temporada do G20."},{"id":"m22","date":"2023-10","type":"dataviz","title":"Second hottest winter in 20 years","desc":"We showed an atypical winter — the hottest September on record, with the North Zone in the worst heat.","links":[{"t":"post","h":"https://www.dados.rio/post/setembro-deste-ano-foi-o-mais-quente-na-serie-historica","cap":"acesso"}],"title_pt":"Segundo inverno mais quente em 20 anos","desc_pt":"Mostramos um inverno atípico — o setembro mais quente já registrado, com a Zona Norte no pior do calor."},{"id":"m23","date":"2023-09","type":"dataviz","title":"1746 hits its best on-time resolution rate","desc":"We published the call center's numbers at their best on-time resolution level since 2021.","links":[{"t":"post","h":"https://www.dados.rio/post/chamadas-do-1746-alcancam-maior-nivel-de-encerramento-no-prazo-desde-2021","cap":"acesso"}],"title_pt":"1746 atinge sua melhor taxa de resolução no prazo","desc_pt":"Publicamos os números da central com o melhor índice de resolução no prazo desde 2021."},{"id":"m24","date":"2023-03","type":"dataviz","title":"BRT — you're the owner","desc":"Two short pieces turning open BRT data into a call to citizens — the system is yours; take care of it.","links":[{"t":"o dono é você","h":"https://www.dados.rio/post/brt-o-dono-e-voce","cap":"acesso"},{"t":"cuide do que é nosso","h":"https://www.dados.rio/post/brt-cuide-do-que-e-nosso","cap":"acesso"}],"title_pt":"BRT e largest port of entry for enslaved Africans in the Americas, where an estimated one million people arrived — and the erasures the site endured. Produced by the Data Office.","title_pt":"Fluxo desumano: a escravidão no Rio de Janeiro","desc_pt":"Uma reportagem em dados para o Dia da Consciência Negra sobre o Cais do Valongo — o maior porto de entrada de africanos escravizados nas Américas, por onde estima-se que chegou cerca de um milhão de pessoas — e as tentativas de apagamento do lugar. Produzido pelo Escritório de Dados.","links":[{"t":"dados.rio","h":"https://www.dados.rio/post/dia-da-consciencia-negra","cap":"acesso"}]},{"id":"d03","date":"2022-11","type":"dataviz","title":"After the pandemic, Galeão hasn't recovered its flights","desc":"A data story using ANAC arrival and departure records to show how Rio's Galeão international airport has struggled to recover its pre-pandemic flight volume. Produced by the Data Office.","title_pt":"Após pandemia, Galeão não recupera volume de voos","desc_pt":"Uma reportagem em dados que usa os registros de chegadas e partidas da ANAC para mostrar como o Aeroporto Internacional do Galeão tem dificuldade de retomar o volume de voos anterior à pandemia. Produzido pelo Escritório de Dados.","links":[{"t":"dados.rio","h":"https://www.dados.rio/post/apos-pandemia-galeao-nao-recupera-volume-de-voos","cap":"acesso"}]},{"id":"m28","date":"2022-11","type":"dataviz","title":"Carioca World Cup Album","desc":"Our World Cup album — carioca players across every Cup, in a playful special.","links":[{"t":"álbum","h":"https://www.dados.rio/especiais/copa-do-mundo-carioca","cap":"acesso"}],"title_pt":"Álbum Carioca da Copa","desc_pt":"Nosso álbum da Copa — jogadores cariocas em todas as Copas, em um especial descontraído."},{"id":"d04","date":"2022-10","type":"dataviz","title":"Up for a little samba on Saturday?","desc":"A data piece mapping the city's official samba circles (rodas de samba) — most of them in the North Zone, across neighborhoods like Vila Isabel, Madureira and Méier — with data from the Culture Secretariat. Produced by the Data Office.","title_pt":"Vai um sambinha no sábado?","desc_pt":"Uma peça em dados que mapeia as rodas de samba oficializadas da cidade — a maioria na Zona Norte, em bairros como Vila Isabel, Madureira e Méier — com dados da Secretaria Municipal de Cultura. Produzido pelo Escritório de Dados.","links":[{"t":"dados.rio","h":"https://www.dados.rio/post/sambinha-no-centro-no-sabado","cap":"acesso"}]},{"id":"d05","date":"2022-09","type":"dataviz","title":"The city and Rock in Rio, in numbers","desc":"An interactive piece putting the 2022 Rock in Rio into figures — the festival and the city's role around it. Produced by the Data Office.","title_pt":"Prefeitura e Rock in Rio em números","desc_pt":"Uma peça interativa que coloca o Rock in Rio de 2022 em números — o festival e o papel da cidade em torno dele. Produzido pelo Escritório de Dados.","links":[{"t":"dados.rio","h":"https://www.dados.rio/post/prefeitura-e-rock-in-rio-em-numeros","cap":"acesso"}]},{"id":"d06","date":"2022-08","type":"dataviz","title":"Rio and the waters of March","desc":"A data story — nodding to Tom Jobim’s \"Águas de Março\" — on the rains and flooding that mark carioca life, showing that March is not, in fact, the month that causes the most disasters. Produced by the Data Office.","title_pt":"O Rio das águas de Março","desc_pt":"Uma reportagem em dados — em referência a \"Águas de Março\", de Tom Jobim — sobre as chuvas e alagamentos que marcam a vida carioca, mostrando que março não é, na verdade, o mês que mais causa desastres. Produzido pelo Escritório de Dados.","links":[{"t":"dados.rio","h":"https://www.dados.rio/post/o-rio-das-aguas-de-marco","cap":"acesso"}]},{"id":"m29","date":"2022-07","type":"dataviz","title":"Rio fighting hunger — in numbers","desc":"We showed community kitchens, Hortas Cariocas and popular restaurants — the city's food-security network in a single piece.","links":[{"t"       filterEl.addEventListener("click", (e) => {
        const b = e.target.closest(".mfilter-chip");
        if (!b) return;
        const c = b.dataset.cat;
        // single-select: picking a category clears the others; "All" clears the filter
        activeCats = (c === "__all") ? null : new Set([c]);
        applyFilter();
      });
      renderChips();

      // on mobile the filter scrolls with the content (moved into the list flow);
      // on desktop it lives in the header between the logo and the nav
      const headerHost = filterEl.parentElement;         // .navigation-items-2
      const headerAnchor = filterEl.nextElementSibling;  // the nav .navigation-wrap
      function placeFilter() {
        const mobile = window.matchMedia("(max-width: 860px)").matches;
        if (mobile && filterEl.parentElement !== section) {
          section.insertBefore(filterEl, listEl);
        } else if (!mobile && filterEl.parentElement !== headerHost) {
          headerHost.insertBefore(filterEl, headerAnchor);
        }
      }
      // ---- boot ----
      placeFilter();
      rebuild(null);                            // first item centred & selected
      function reflow() { rebuild(activeIdx >= 0 ? activeIdx : null); }
      window.addEventListener("load", reflow);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(reflow);
      var resizeT;
      window.addEventListener("resize", function () {
        placeFilter();
        clearTimeout(resizeT);
        resizeT = setTimeout(reflow, 150);
      });
    })();
  </script>
