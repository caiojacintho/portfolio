    const MENTIONS = [{"id":"m01","date":"2026","type":"website","title":"Pref.Rio — City of Rio official portal","desc":"The City of Rio de Janeiro's official portal, bringing public services, information and citizen support together in one place. I worked on the design and digital communication.","links":[{"t":"pref.rio","h":"http://pref.rio/","cap":"acesso"}]},{"id":"m02","date":"2026","type":"website","title":"Oportunidades Cariocas","desc":"A City of Rio platform gathering free, certified courses, connecting cariocas to training and job opportunities.","links":[{"t":"Oportunidades Cariocas","h":"https://pref.rio/servicos/cursos","cap":"acesso"},{"t":"nota da prefeitura","h":"https://prefeitura.rio/cidade/prefeitura-lanca-plataforma-para-gerar-oportunidades-de-trabalho-e-capacitacao-de-profissionais/","cap":"news"}]},{"id":"m03","date":"2025","type":"website","title":"IplanRio — the City of Rio’s tech company","desc":"Rio de Janeiro's municipal information-technology company, responsible for the city's digital systems and services. I lead the Design team.","links":[{"t":"iplan.rio","h":"https://www.iplan.rio/","cap":"acesso"}]},{"id":"m04","date":"2025","type":"website","title":"Embyá — Brazilian landscape studio","desc":"A landscape and environmental-design studio — projects and works for collective spaces, vertical gardens and territorial planning. I handled the visual identity and digital presence.","links":[{"t":"embya.com.br","h":"https://www.embya.com.br/","cap":"acesso"}]},{"id":"m05","date":"2025","type":"website","title":"Invest Rio — where to invest in Rio","desc":"A portal that presents Rio to investors: business opportunities, data and incentives to attract investment and economic development to the city.","links":[{"t":"Invest Rio","h":"https://portal-de-investimentos.webflow.io/","cap":"acesso"}]},{"id":"m06","date":"2025","type":"dataviz","title":"Super Centro Carioca de Saúde","desc":"A data story about the Super Centro Carioca de Saúde — described as the largest health complex in Latin America — and how it helped shorten the Sisreg waiting line. Produced by the Data Office.","links":[{"t":"Supercentro","h":"https://viz.dados.rio/#/supercentro","cap":"acesso"}]},{"id":"m07","date":"2026","type":"dataviz","title":"Does verticalization drive densification?","desc":"A data visualization exploring whether verticalization really densifies the population, and how São Paulo's Master Plan can foster a more compact city. In partnership with Insper / Portal Cidades.","links":[{"t":"Adensamento","h":"https://portalcidados.github.io/datavis/#/adensamento","cap":"acesso"}]},{"id":"m08","date":"2026","type":"dataviz","title":"Heat islands and air quality in Maré","desc":"A data story on heat islands and air quality in Maré: the Respira Maré project mapped, over seven months, temperatures up to 2°C higher and pollutants affecting the health of one of Rio's largest favelas.","links":[{"t":"Portal Cidades","h":"https://portal-cidados.vercel.app/historias/ilhas-de-calor","cap":"acesso"}]},{"id":"m09","date":"2026","type":"dataviz","title":"A portrait of health inequalities","desc":"A portrait of health inequalities in the city of São Paulo: mortality risks and socioeconomic determinants, cross-referencing diseases like diabetes with each territory's social conditions.","links":[{"t":"Portal Cidades","h":"https://portal-cidados.vercel.app/historias/desigualdades-em-saude-sp","cap":"acesso"}]},{"id":"m10","date":"2026","type":"website","title":"Center for City Studies portal","desc":"The portal of the Center for City Studies (Insper's Arq.Futuro Lab) that turns urban research into data-driven narratives, bringing science closer to public debate on urban policy.","links":[{"t":"portal-cidados","h":"https://portal-cidados.vercel.app/","cap":"acesso"}]},{"id":"m11","date":"2026","type":"website","title":"National Observatory of Sustainable Mobility","desc":"An Insper (Center for City Studies) platform with Motiva that gathers urban-mobility indicators and evidence to connect cities and support more sustainable policies.","links":[{"t":"Observatório Insper","h":"https://observatorio.insper.edu.br/","cap":"acesso"}]},{"id":"m12","date":"2025-10","type":"website","title":"Integrated Clinical Record","desc":"A unified clinical record bringing together, for around 7 million patients, data across primary and emergency care. Built by the city health department (SMS) on the health data lake, with IplanRio / the Data Office.","links":[{"t":"HCI (SMS)","h":"https://saude.prefeitura.rio/hci/","cap":"acesso"},{"t":"nota SMS","h":"https://saude.prefeitura.rio/noticias/historico-clinico-integrado-saude-mais-eficiente-e-personalizada/","cap":"news"},{"t":"O Globo","h":"https://oglobo.globo.com/rio/noticia/2025/10/09/secretaria-municipal-de-saude-do-rio-desenvolve-plataforma-que-reune-historico-clinico-de-7-milhoes-de-pacientes.ghtml","cap":"news"}]},{"id":"m13","date":"2025-02","type":"website","title":"Mulher.Rio","desc":"An app from Rio's Women's Secretariat that helps women recognize signs of violence and find specialized support, anonymously. Technology with CIVITAS and IplanRio; later promoted on Taxi.Rio during Agosto Lilás.","links":[{"t":"mulher.rio","h":"https://www.mulher.rio/","cap":"acesso"},{"t":"Diário do Rio","h":"https://diariodorio.com/prefeitura-do-rio-lanca-site-para-apoiar-mulheres-em-situacao-de-violencia/","cap":"news"},{"t":"Agosto Lilás × Taxi.Rio","h":"https://prefeitura.rio/cidade/secretaria-da-mulher-e-taxi-rio-se-unem-em-campanha-de-combate-a-violencia-contra-as-mulheres/","cap":"news"}]},{"id":"m14","date":"2024-11","type":"dataviz","title":"G20 in Data","desc":"We published an interactive special about what hosting the G20 meant for Rio — money, people and the city's global stage.","links":[{"t":"G20 em Dados","h":"https://prefeitura-rio.github.io/viz_G20/","cap":"acesso"}]},{"id":"m15","date":"2024-06","type":"dataviz","title":"We're watching!","desc":"A public narrative about how the city’s intelligence center watches the city 24/7 — cameras, radars and the pipes behind public safety.","links":[{"t":"Estamos de olho!","h":"https://viz-staging.dados.rio/#/civitas","cap":"acesso"},{"t":"especiais","h":"https://www.dados.rio/especiais","cap":"acesso"}]},{"id":"m16","date":"2024-06","type":"website","title":"CIVITAS — Rio’s Intelligence Center","desc":"The city's intelligence center for public safety — cameras, radars, 1746 and the municipal data lake. IplanRio / the Data Office fed the pipes; Google later cited 6M+ plate reads a day.","links":[{"t":"civitas.rio","h":"https://civitas.rio/","cap":"acesso"},{"t":"Estamos de olho!","h":"https://viz-staging.dados.rio/#/civitas","cap":"acesso"},{"t":"nota de lançamento","h":"https://prefeitura.rio/casa-civil/prefeitura-lanca-central-de-inteligencia-vigilancia-e-tecnologia-de-apoio-a-seguranca-publica-civitas-e-anuncia-parceria-com-disque-denuncia/","cap":"news"}]},{"id":"m17","date":"2024-05","type":"dataviz","title":"Rio has never had so many people working","desc":"We told the story of the job recovery through three cariocas who found work — and the numbers behind the rebound.","links":[{"t":"especial","h":"https://prefeitura-rio.github.io/riodeempregos/","cap":"acesso"}]},{"id":"m18","date":"2024-03","type":"dataviz","title":"Olympic Legacy","desc":"We asked what Rio would be without the Games, and how nomadic architecture tried to avoid white elephants.","links":[{"t":"sem as Olimpíadas","h":"https://prefeitura-rio.github.io/LegadoOlimpico2/","cap":"acesso"},{"t":"sem elefantes brancos","h":"https://prefeitura-rio.github.io/LegadoOlimpico/","cap":"acesso"}]},{"id":"m19","date":"2024","type":"dataviz","title":"Destination: Rio de Janeiro — megaevents","desc":"We mapped why the city spends public money to host the world — not just for the picture.","links":[{"t":"Destino: Rio","h":"https://viz.dados.rio/#/megaeventos","cap":"acesso"}]},{"id":"m20","date":"2024","type":"dataviz","title":"Works & CEP — where the city invests","desc":"Two specials: infrastructure prioritized for the North and West Zones, and the CEP — the street program against violence.","links":[{"t":"A gente prioriza…","h":"https://viz.dados.rio/#/obras","cap":"acesso"},{"t":"Seu Rio, Sua Rua","h":"https://viz.dados.rio/#/especial-seop/cep","cap":"acesso"}]},{"id":"m21","date":"2023-12","type":"dataviz","title":"Rio, Capital of the World","desc":"A time-travel data story about the city's long bet on hosting the world — during the G20 season.","links":[{"t":"Rio Capital do Mundo","h":"https://prefeitura-rio.github.io/G20Dataviz/","cap":"acesso"}]},{"id":"m22","date":"2023-10","type":"dataviz","title":"Second hottest winter in 20 years","desc":"We showed an atypical winter — the hottest September on record, with the North Zone in the worst heat.","links":[{"t":"post","h":"https://www.dados.rio/post/setembro-deste-ano-foi-o-mais-quente-na-serie-historica","cap":"acesso"}]},{"id":"m23","date":"2023-09","type":"dataviz","title":"1746 hits its best on-time resolution rate","desc":"We published the call center's numbers at their best on-time resolution level since 2021.","links":[{"t":"post","h":"https://www.dados.rio/post/chamadas-do-1746-alcancam-maior-nivel-de-encerramento-no-prazo-desde-2021","cap":"acesso"}]},{"id":"m24","date":"2023-03","type":"dataviz","title":"BRT — you're the owner","desc":"Two short pieces turning open BRT data into a call to citizens — the system is yours; take care of it.","links":[{"t":"o dono é você","h":"https://www.dados.rio/post/brt-o-dono-e-voce","cap":"acesso"},{"t":"cuide do que é nosso","h":"https://www.dados.rio/post/brt-cuide-do-que-e-nosso","cap":"acesso"}]},{"id":"m25","date":"2023-02","type":"dataviz","title":"Carnival in Data","desc":"We put Carnival's economy into charts — taxes, tourists, samba schools, blocos and the estimated R$4.5 billion for 2023.","links":[{"t":"Carnaval de Dados","h":"https://www.dados.rio/especiais/carnaval-de-dados","cap":"acesso"}]},{"id":"m26","date":"2023","type":"website","title":"Integrated dashboard for monitoring hydrological events","desc":"An integrated dashboard to monitor hydrological events — listed under Projects on dados.rio.","links":[{"t":"projeto","h":"https://www.dados.rio/projetos/dashboard-integrado-de-monitoramento-de-eventos-hidrologicos","cap":"acesso"}]},{"id":"m27","date":"2023","type":"dataviz","title":"BRT Rio — building and rebuilding","desc":"An updated special on the BRT's reconstruction — new fleet, Transbrasil, Gentileza Terminal and the story of its corridors in numbers.","links":[{"t":"reconstrução BRT","h":"https://www.dados.rio/especiais/reconstrucao-brt","cap":"acesso"}]},{"id":"m28","date":"2022-11","type":"dataviz","title":"Carioca World Cup Album","desc":"Our World Cup album — carioca players across every Cup, in a playful special.","links":[{"t":"álbum","h":"https://www.dados.rio/especiais/copa-do-mundo-carioca","cap":"acesso"}]},{"id":"m29","date":"2022-07","type":"dataviz","title":"Rio fighting hunger — in numbers","desc":"We showed community kitchens, Hortas Cariocas and popular restaurants — the city's food-security network in a single piece.","links":[{"t":"post","h":"https://www.dados.rio/post/o-rio-de-janeiro-no-combate-a-fome","cap":"acesso"}]},{"id":"m30","date":"2022-06","type":"dataviz","title":"The city's newest neighborhood","desc":"Two June pieces: which is the city’s newest neighborhood, and how São João asks permission in the city of Carnival.","links":[{"t":"bairro mais novo","h":"https://www.dados.rio/post/voce-sabe-qual-e-o-bairro-mais-novo-da-cidade","cap":"acesso"},{"t":"São João","h":"https://www.dados.rio/post/na-cidade-do-carnaval-sao-joao-pede-licenca","cap":"acesso"}]},{"id":"m31","date":"2022-06","type":"website","title":"Rio's municipal public data lake","desc":"We launched what we called the world's first municipal public data lake — real-time, queryable, across departments.","links":[{"t":"post de lançamento","h":"https://www.dados.rio/post/o-primeiro-datalake-publico-municipal-do-mundo","cap":"acesso"}]},{"id":"m32","date":"2022-05","type":"dataviz","title":"How much is a roast chicken in your neighborhood?","desc":"Our biggest hit that year — a Big Mac–style index of roast chicken across 160 neighborhoods; tens of thousands of impressions and press echo.","links":[{"t":"frangão","h":"https://www.dados.rio/post/quanto-custa-um-frangao-no-seu-bairro","cap":"acesso"}]},{"id":"m33","date":"2022-05","type":"dataviz","title":"Rio's coldest days","desc":"We ranked the coldest days on record — a weather piece ahead of the heat stories.","links":[{"t":"post","h":"https://www.dados.rio/post/os-dias-mais-frios-da-cidade-do-rio-de-janeiro","cap":"acesso"}]},{"id":"m36","date":"2022","type":"dataviz","title":"Over 1,300 fewer illegal buildings","desc":"A special on demolitions — losses to organized crime, green areas preserved and more safety for residents.","links":[{"t":"demolições","h":"https://share.dados.rio/demolicoes","cap":"acesso"}]},{"id":"m37","date":"2022","type":"dataviz","title":"BRT in facts & From work to the beat","desc":"Two early specials: BRT corridors past and future in numbers, and Carnival's return for every carioca — even those who dodge samba.","links":[{"t":"BRT passado e futuro","h":"https://www.dados.rio/especiais/brt","cap":"acesso"},{"t":"Do batente ao batuque","h":"https://www.dados.rio/especiais/do-batente-ao-batuque","cap":"acesso"}]},{"id":"m38","date":"2018-09","type":"arch","title":"Bairro Crixá Educational Center","desc":"An award-winning entry in a national architecture competition for São Sebastião, DF.","links":[{"t":"premiados","h":"https://concursosdeprojeto.org/2018/09/06/premiados-concurso-nacional-centro-educacional-bairro-crixa-sao-sebastiao-df/","cap":"acesso"}]},{"id":"m39","date":"2017-10","type":"arch","title":"Pôr do Sol Housing Sector","desc":"An award-winning entry in a national architecture competition for Ceilândia, DF.","links":[{"t":"premiados","h":"https://concursosdeprojeto.org/2017/10/28/premiados-concurso-nacional-setor-habitacional-por-do-sol-ceilandia-df/","cap":"acesso"}]}];
    // até 10 cores, atribuídas por posição — cicla de modo que
    // duas linhas vizinhas nunca compartilhem a mesma cor
    const PALETTE = ["#22c55e","#f59e0b","#38bdf8","#a3e635","#f472b6","#c4b5fd","#fbbf24","#67e8f9","#fca5a5","#fdba74"];

    (function () {
      const section = document.getElementById("ttcl");
      const listEl = document.getElementById("ttclList");
      const detail = document.getElementById("ttclDetail");
      const dMeta = document.getElementById("dMeta");
      const dCat = document.getElementById("dCat");
      const dTitle = document.getElementById("dTitle");
      const dDesc = document.getElementById("dDesc");
      const dLinks = document.getElementById("dLinks");
      const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>';

      const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);

      const rows = [];
      MENTIONS.forEach((m, i) => {
        const li = document.createElement("li");
        li.className = "ttcl__row";
        li.dataset.idx = i;
        li.dataset.type = m.type;
        li.innerHTML =
          '<span class="ttcl__name">' + cap(m.title) + '</span>' +
          '<span class="ttcl__badge">' + cap(m.type) + '</span>';
        listEl.appendChild(li);
        rows.push(li);
      });

      // light, thin "mouse click" when the selected line changes (synthesized, no asset)
      var actx = null, audioUnlocked = false;
      function ensureAudio() {
        try {
          if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
          if (actx.state === "suspended") actx.resume();
          if (!audioUnlocked) { // iOS: play a silent buffer inside the gesture to unlock
            var b = actx.createBuffer(1, 1, 22050);
            var s = actx.createBufferSource(); s.buffer = b; s.connect(actx.destination); s.start(0);
            audioUnlocked = true;
          }
        } catch (e) {}
      }
      function clickSound() {
        if (!actx || actx.state !== "running") return;
        var t = actx.currentTime;
        var len = Math.floor(actx.sampleRate * 0.012); // ~12ms noise burst
        var buf = actx.createBuffer(1, len, actx.sampleRate);
        var ch = buf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
        var src = actx.createBufferSource(); src.buffer = buf;
        var hp = actx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 3800;
        var g = actx.createGain();
        g.gain.setValueAtTime(0.05, t);
        g.gain.exponentialRampToValueAtTime(0.0005, t + 0.02);
        src.connect(hp); hp.connect(g); g.connect(actx.destination);
        src.start(t); src.stop(t + 0.03);
      }
      ["pointerdown", "touchstart", "touchend", "keydown", "click", "wheel", "scroll"].forEach(function (ev) {
        window.addEventListener(ev, ensureAudio, { passive: true });
      });

      let activeRow = null;
      function activate(li) {
        if (li === activeRow) return;
        if (activeRow) activeRow.classList.remove("is-active");
        activeRow = li;
        li.classList.add("is-active");
        const idx = +li.dataset.idx;
        const m = MENTIONS[idx];
        const color = PALETTE[idx % PALETTE.length];
        section.style.setProperty("--bg", color);
        dMeta.textContent = (m.date || "").slice(0, 4);
        dCat.textContent = cap(m.type || "");
        dTitle.textContent = cap(m.title);
        dDesc.textContent = cap(m.desc || "");
        var accessLink = (m.links || []).find(function (l) { return l.cap === 'acesso'; });
        var newsLink = (m.links || []).find(function (l) { return l.cap === 'news'; });
        var linksHtml = '';
        if (accessLink) linksHtml += '<a class="ttcl__lnk" href="' + accessLink.h + '" target="_blank" rel="noopener"><span class="ttcl__lnk-t">Link</span></a>';
        if (newsLink) linksHtml += '<a class="ttcl__lnk" href="' + newsLink.h + '" target="_blank" rel="noopener"><span class="ttcl__lnk-t">News</span></a>';
        dLinks.innerHTML = linksHtml;
        detail.classList.add("is-on");
        clickSound();
        syncMobile();
      }

      // on mobile the card is fixed at the top with auto height (no internal scroll);
      // push the list down so it starts right below the card
      function syncMobile() { listEl.style.marginTop = ""; listEl.style.paddingBottom = ""; }
      window.addEventListener("resize", syncMobile);
      window.addEventListener("load", syncMobile);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(syncMobile);

      // activation is scroll-driven only; tap still lets you jump to an item
      rows.forEach((li) => li.addEventListener("click", () => activate(li)));

      function onScroll() {
        var visible = rows.filter(function (li) { return !li.classList.contains("is-hidden"); });
        if (!visible.length) return;
        var doc = document.documentElement;
        // make the extremes always reachable
        if (window.scrollY <= 2) { activate(visible[0]); return; }
        if ((window.innerHeight + window.scrollY) >= (doc.scrollHeight - 2)) { activate(visible[visible.length - 1]); return; }
        var refY = window.innerHeight * 0.22;
        var best = null;
        for (var i = 0; i < visible.length; i++) {
          if (visible[i].getBoundingClientRect().top <= refY) best = visible[i];
          else break;
        }
        activate(best || visible[0]);
      }
      window.addEventListener("scroll", onScroll, { passive: true });

      // drag the detail card (desktop)
      let dragging = false, sx = 0, sy = 0, tx = 0, ty = 0, bx = 0, by = 0;
      detail.addEventListener("pointerdown", (e) => {
        if (window.matchMedia("(max-width: 860px)").matches) return; // card is pinned on mobile
        if (e.target.closest("a")) return; // let buttons work
        dragging = true; sx = e.clientX; sy = e.clientY; bx = tx; by = ty;
        detail.classList.add("is-drag");
        detail.setPointerCapture(e.pointerId);
      });
      detail.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        tx = bx + (e.clientX - sx); ty = by + (e.clientY - sy);
        detail.style.transform = "translate(" + tx + "px, calc(-50% + " + ty + "px))";
      });
      const endDrag = () => { dragging = false; detail.classList.remove("is-drag"); };
      detail.addEventListener("pointerup", endDrag);
      detail.addEventListener("pointercancel", endDrag);

      // ---- category filter (Mentions header) ----
      const filterEl = document.getElementById("mFilter");
      const cats = [];
      MENTIONS.forEach(m => { if (!cats.includes(m.type)) cats.push(m.type); });
      let activeCats = null; // null = all categories shown
      function addChip(label, cat) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "mfilter-chip";
        b.textContent = label;
        b.dataset.cat = cat;
        filterEl.appendChild(b);
      }
      addChip("All", "__all");
      cats.forEach(c => addChip(cap(c), c));
      function renderChips() {
        [...filterEl.children].forEach(b => {
          const c = b.dataset.cat;
          const on = c === "__all" ? (activeCats === null) : (activeCats && activeCats.has(c));
          b.classList.toggle("is-on", !!on);
        });
      }
      function applyFilter() {
        for (const li of rows) {
          const vis = activeCats === null || activeCats.has(li.dataset.type);
          li.classList.toggle("is-hidden", !vis);
        }
        renderChips();
        const firstVis = rows.find(li => !li.classList.contains("is-hidden"));
        if (firstVis) { activeRow = null; activate(firstVis); }
        listEl.scrollTop = 0;
        window.scrollTo(0, 0);
      }
      filterEl.addEventListener("click", (e) => {
        const b = e.target.closest(".mfilter-chip");
        if (!b) return;
        const c = b.dataset.cat;
        if (c === "__all") activeCats = null;
        else if (activeCats === null) activeCats = new Set([c]);
        else {
          activeCats.has(c) ? activeCats.delete(c) : activeCats.add(c);
          if (activeCats.size === 0) activeCats = null;
        }
        applyFilter();
      });
      renderChips();

      // on mobile the filter scrolls with the content (moved into the list flow);
      // on desktop it lives in the header between the logo and the nav
      const headerHost = filterEl.parentElement;         // .navigation-items-2
      const headerAnchor = filterEl.nextElementSibling;  // the nav .navigation-wrap
      function placeFilter() {
        const mobile = window.matchMedia("(max-width: 860px)").matches;
        if (mobile && filterEl.parentElement !== section) {
          section.insertBefore(filterEl, listEl);
        } else if (!mobile && filterEl.parentElement !== headerHost) {
          headerHost.insertBefore(filterEl, headerAnchor);
        }
      }
      window.addEventListener("resize", placeFilter);
      placeFilter();

      // start with the first item selected; scroll takes over from there
      activate(rows[0]);
    })();
  </script>
